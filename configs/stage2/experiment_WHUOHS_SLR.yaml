task: segmentation
continual_pretrain_run: null
seed: 0
verbose: True
device: [0]
wandb:
  mode: offline #online
  fast_dev_run: False
  entity: lscheibenreif
  project: SLR_WHUOHS
  log_model: False
  experiment_dir: logs/SLR_WHUOHS
  cache_dir: cache/
data:
  datamodule: WHUOHSDataModule
  root: /mnt/storage/yzhang/data/WHUOHS/
  num_classes: 23
  img_size: 224
  re_img_size: 224
  few_shot_k: null
  few_shot_seed: null
  IGNORE_LABEL  : 0
model:
  name: upernet #upernet, upernet-DINOv3
  deepsup: False
  backbone: sat_mae_pp #dinov3, sat_mae_pp, scale_mae
  backbone_type: ""
  feature_map_indices: [5, 11, 17, 23]
  patch_size: 16
  token_length: 100
  freeze_backbone: True
  pretrained: True
  input_res: 10
  fixed_output_size: 0
  embed_dim: 1024
  use_mask_token: True
  adapter: True
  adapter_trainable: True
  norm_trainable: True
  adapter_type: low-rank-scaling
  adapter_scale: 1.0
  adapter_hidden_dim: 16
  adapter_shared: False  # same adapter weights for every attention block
  train_patch_embed: False
  patch_embed_adapter: True
  patch_embed_adapter_scale: 1
  train_cls_mask_tokens: False
  train_all_params: False  # overwrites all the above (freeze_backbone, train_patch_embed, adapter, adapter_shared)
  loss_on_all_patches: True
  only_scaler_trainable: False
  only_bias_trainable: False
  wavelength: null
optim:
  lr: 1e-4
  batch_size: 32
  warmup_epochs: 5
  num_workers: 4
  min_steps: 30000
  max_steps: 45000
  aux_loss_factor: 0.1
  lr_schedule_patience: 10